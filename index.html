<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athenea Store — Elegancia en cada detalle</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['Playfair Display', 'Georgia', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            border: 'hsl(var(--border, 240 5.9% 90%))',
            input: 'hsl(var(--input, 240 5.9% 90%))',
            ring: 'hsl(var(--ring, 240 5.9% 10%))',
            background: 'hsl(var(--background, 0 0% 100%))',
            foreground: 'hsl(var(--foreground, 240 10% 3.9%))',
            primary: {
              DEFAULT: 'hsl(var(--primary, 240 5.9% 10%))',
              foreground: 'hsl(var(--primary-foreground, 0 0% 98%))',
            },
            secondary: {
              DEFAULT: 'hsl(var(--secondary, 240 4.8% 95.9%))',
              foreground: 'hsl(var(--secondary-foreground, 240 5.9% 10%))',
            },
            destructive: {
              DEFAULT: 'hsl(var(--destructive, 0 84.2% 60.2%))',
              foreground: 'hsl(var(--destructive-foreground, 0 0% 98%))',
            },
            muted: {
              DEFAULT: 'hsl(var(--muted, 240 4.8% 95.9%))',
              foreground: 'hsl(var(--muted-foreground, 240 3.8% 46.1%))',
            },
            accent: {
              DEFAULT: 'hsl(var(--accent, 240 4.8% 95.9%))',
              foreground: 'hsl(var(--accent-foreground, 240 5.9% 10%))',
            },
            popover: {
              DEFAULT: 'hsl(var(--popover, 0 0% 100%))',
              foreground: 'hsl(var(--popover-foreground, 240 10% 3.9%))',
            },
            card: {
              DEFAULT: 'hsl(var(--card, 0 0% 100%))',
              foreground: 'hsl(var(--card-foreground, 240 10% 3.9%))',
            },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
      --radius: 0.5rem;
    }
    .dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --popover: 240 10% 3.9%;
      --popover-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
  <!-- React, ReactDOM, Babel, Lucide Icons -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // Generar o recuperar ID de sesión único para el carrito
    function getOrCreateSessionId() {
      let id = localStorage.getItem('athenea-session-id');
      if (!id) {
        id = 's-' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('athenea-session-id', id);
      }
      return id;
    }

    const sessionId = getOrCreateSessionId();

    function App() {
      const [ready, setReady] = useState(false);
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState([]);
      const [cart, setCart] = useState([]);
      const [paymentMethods, setPaymentMethods] = useState([]);
      const [whatsapp, setWhatsapp] = useState('584120000000');
      const [department, setDepartment] = useState('mujer');
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [cartOpen, setCartOpen] = useState(false);
      const [checkoutOpen, setCheckoutOpen] = useState(false);
      const [adminOpen, setAdminOpen] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('products');
      const [theme, setTheme] = useState('light');
      
      // Estado para almacenar la talla seleccionada por cada producto
      const [selectedSizes, setSelectedSizes] = useState({});

      // Cargar datos iniciales desde el servidor local
      const loadStoreData = async () => {
        try {
          const res = await fetch('/api/store');
          const data = await res.json();
          setProducts(data.products);
          setCategories(data.categories);
          setPaymentMethods(data.paymentMethods);
          setWhatsapp(data.whatsapp);

          const cartRes = await fetch(`/api/cart?sessionId=${sessionId}`);
          const cartData = await cartRes.json();
          setCart(cartData.items || []);
          setReady(true);
        } catch (err) {
          console.error("Error cargando datos del servidor local:", err);
        }
      };

      useEffect(() => {
        loadStoreData();
        const savedTheme = localStorage.getItem('athenea-theme') || 'light';
        setTheme(savedTheme);
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        setIsAdmin(localStorage.getItem('athenea-admin-session') === 'true');
      }, []);

      const toggleTheme = () => {
        const nextTheme = theme === 'light' ? 'dark' : 'light';
        setTheme(nextTheme);
        localStorage.setItem('athenea-theme', nextTheme);
        if (nextTheme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      };

      // Sincronizar carrito con el servidor local
      const syncCart = async (newCart) => {
        setCart(newCart);
        try {
          await fetch('/api/cart', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, items: newCart })
          });
        } catch (err) {
          console.error("Error sincronizando carrito:", err);
        }
      };

      const addToCart = (productId, size) => {
        const existing = cart.find(i => i.productId === productId && i.size === size);
        let newCart;
        if (existing) {
          newCart = cart.map(i => i.productId === productId && i.size === size ? { ...i, quantity: i.quantity + 1 } : i);
        } else {
          newCart = [...cart, { productId, size, quantity: 1 }];
        }
        syncCart(newCart);
      };

      const updateCartQuantity = (productId, size, quantity) => {
        let newCart;
        if (quantity <= 0) {
          newCart = cart.filter(i => !(i.productId === productId && i.size === size));
        } else {
          newCart = cart.map(i => i.productId === productId && i.size === size ? { ...i, quantity } : i);
        }
        syncCart(newCart);
      };

      const removeFromCart = (productId, size) => {
        const newCart = cart.filter(i => !(i.productId === productId && i.size === size));
        syncCart(newCart);
      };

      const clearCart = () => {
        syncCart([]);
      };

      const cartCount = useMemo(() => cart.reduce((acc, i) => acc + i.quantity, 0), [cart]);
      const cartTotal = useMemo(() => cart.reduce((acc, i) => {
        const prod = products.find(p => p.id === i.productId);
        return acc + (prod ? prod.price * i.quantity : 0);
      }, 0), [cart, products]);

      const departmentCategories = useMemo(() => categories.filter(c => c.department === department), [categories, department]);
      const visibleProducts = useMemo(() => {
        const categoryIds = departmentCategories.map(c => c.id);
        return products.filter(p => {
          if (selectedCategory) return p.categoryId === selectedCategory;
          return categoryIds.includes(p.categoryId);
        });
      }, [products, departmentCategories, selectedCategory]);

      if (!ready) {
        return (
          <div className="flex min-h-screen items-center justify-center bg-background text-foreground">
            <p className="text-sm tracking-widest uppercase animate-pulse">Cargando Athenea Store...</p>
          </div>
        );
      }

      return (
        <div className="flex min-h-screen flex-col bg-background text-foreground">
          {/* Header */}
          <header className="sticky top-0 z-40 border-b border-border bg-background/80 backdrop-blur-md">
            <div className="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 md:px-6">
              <h1 className="font-serif text-xl font-semibold tracking-[0.2em] uppercase">Athenea</h1>
              
              <div className="flex items-center gap-4">
                <button onClick={toggleTheme} className="p-2 hover:bg-accent rounded-full transition-colors">
                  {theme === 'light' ? '🌙' : '☀️'}
                </button>
                <button onClick={() => setAdminOpen(true)} className="text-xs uppercase tracking-widest hover:underline">
                  Admin
                </button>
                <button onClick={() => setCartOpen(true)} className="relative p-2 hover:bg-accent rounded-full transition-colors">
                  🛒 {cartCount > 0 && (
                    <span className="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-primary-foreground">
                      {cartCount}
                    </span>
                  )}
                </button>
              </div>
            </div>
          </header>

          {/* Hero */}
          <section className="relative overflow-hidden border-b border-border py-12 md:py-20">
            <div className="mx-auto max-w-6xl px-4 md:px-6 grid md:grid-cols-2 gap-8 items-center">
              <div className="text-left">
                <p className="text-[11px] uppercase tracking-[0.3em] text-muted-foreground">
                  {department === 'mujer' ? 'Nueva colección — Mujer' : department === 'hombre' ? 'Nueva colección — Hombre' : 'Nueva colección — Niños'}
                </p>
                <h2 className="mt-4 font-serif text-4xl md:text-6xl font-light tracking-wide leading-tight">
                  {department === 'mujer' ? 'Elegancia en cada detalle' : department === 'hombre' ? 'Estilo con carácter' : 'Pequeños con gran estilo'}
                </h2>
                <p className="mt-6 max-w-lg text-sm text-muted-foreground leading-relaxed">
                  {department === 'mujer' 
                    ? 'Vestidos, deportivo, corsets, lencería y bikinis seleccionados para realzar tu estilo. Calidad premium, diseño atemporal.' 
                    : department === 'hombre'
                    ? 'Camisas, pantalones y deportivo pensados para el día a día. Cortes impecables, tejidos de calidad y un look refinado sin esfuerzo.'
                    : 'Ropa infantil suave, cómoda y con personalidad. Prendas pensadas para jugar, crecer y lucir siempre impecables.'}
                </p>
                <div className="mt-10 flex flex-wrap gap-4">
                  <button 
                    onClick={() => setDepartment('mujer')}
                    className={`px-6 py-2 text-xs uppercase tracking-widest border transition-all ${department === 'mujer' ? 'bg-foreground text-background border-foreground' : 'border-border hover:border-foreground'}`}
                  >
                    Mujer
                  </button>
                  <button 
                    onClick={() => setDepartment('hombre')}
                    className={`px-6 py-2 text-xs uppercase tracking-widest border transition-all ${department === 'hombre' ? 'bg-foreground text-background border-foreground' : 'border-border hover:border-foreground'}`}
                  >
                    Hombre
                  </button>
                  <button 
                    onClick={() => setDepartment('ninos')}
                    className={`px-6 py-2 text-xs uppercase tracking-widest border transition-all ${department === 'ninos' ? 'bg-foreground text-background border-foreground' : 'border-border hover:border-foreground'}`}
                  >
                    Niños
                  </button>
                </div>
              </div>
              <div className="relative aspect-[4/5] w-full overflow-hidden bg-muted rounded-lg shadow-sm">
                <img 
                  src={department === 'mujer' 
                    ? 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800' 
                    : department === 'hombre'
                    ? 'https://images.unsplash.com/photo-1617137968427-85924c800a22?w=800'
                    : 'https://images.unsplash.com/photo-1519457431-44ccd64a579b?w=800'} 
                  alt="Colección Athenea" 
                  className="h-full w-full object-cover object-center transition-all duration-700"
                />
              </div>
            </div>
          </section>

          {/* Catálogo */}
          <main className="flex-1 mx-auto max-w-6xl px-4 py-12 md:px-6">
            <div className="flex flex-wrap items-center justify-between gap-4 border-b border-border pb-6">
              <h3 className="font-serif text-2xl">La Colección</h3>
              <div className="flex gap-2">
                <button 
                  onClick={() => setSelectedCategory(null)}
                  className={`px-3 py-1 text-[10px] uppercase tracking-widest border ${!selectedCategory ? 'bg-foreground text-background border-foreground' : 'border-border'}`}
                >
                  Todo
                </button>
                {departmentCategories.map(cat => (
                  <button 
                    key={cat.id}
                    onClick={() => setSelectedCategory(cat.id)}
                    className={`px-3 py-1 text-[10px] uppercase tracking-widest border ${selectedCategory === cat.id ? 'bg-foreground text-background border-foreground' : 'border-border'}`}
                  >
                    {cat.name}
                  </button>
                ))}
              </div>
            </div>

            {/* Productos */}
            <div className="mt-8 grid grid-cols-2 gap-x-4 gap-y-10 md:grid-cols-3 lg:grid-cols-4">
              {visibleProducts.map(product => {
                const selectedSize = selectedSizes[product.id] || '';
                return (
                  <div key={product.id} className="group relative flex flex-col justify-between border border-border/50 p-3 rounded-lg bg-card shadow-sm">
                    <div>
                      <div className="aspect-[3/4] w-full overflow-hidden bg-muted rounded-lg">
                        <img src={product.image} alt={product.name} className="h-full w-full object-cover object-center transition-transform duration-300 group-hover:scale-105" />
                      </div>
                      <div className="mt-4 flex justify-between gap-2">
                        <div>
                          <h4 className="text-sm font-medium line-clamp-1">{product.name}</h4>
                          <p className="mt-1 text-xs text-muted-foreground line-clamp-2">{product.description}</p>
                        </div>
                        <p className="text-sm font-semibold text-foreground shrink-0">${product.price}</p>
                      </div>
                    </div>
                    
                    <div>
                      {/* Selector de Tallas */}
                      <div className="mt-4">
                        <p className="text-[10px] uppercase tracking-wider text-muted-foreground mb-1.5">Talla:</p>
                        <div className="flex flex-wrap gap-1">
                          {product.sizes.map(size => (
                            <button 
                              key={size}
                              onClick={() => setSelectedSizes(prev => ({ ...prev, [product.id]: size }))}
                              className={`px-2 py-0.5 text-[10px] border rounded transition-all ${selectedSize === size ? 'bg-foreground text-background border-foreground font-bold' : 'border-border hover:border-foreground'}`}
                            >
                              {size}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Botón Agregar al Carrito */}
                      <button
                        disabled={!selectedSize}
                        onClick={() => {
                          addToCart(product.id, selectedSize);
                          alert(`¡Agregado al carrito: ${product.name} (Talla ${selectedSize})!`);
                        }}
                        className="mt-3 w-full bg-foreground text-background py-2 text-[10px] uppercase tracking-widest font-medium rounded hover:bg-foreground/90 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                      >
                        {selectedSize ? 'Agregar al Carrito' : 'Selecciona una Talla'}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </main>

          {/* Métodos de Pago */}
          <section className="border-t border-border bg-muted/30 py-16">
            <div className="mx-auto max-w-6xl px-4 md:px-6">
              <h3 className="font-serif text-2xl text-center mb-10">Métodos de Pago</h3>
              <div className="grid gap-6 md:grid-cols-3">
                {paymentMethods.filter(m => m.enabled).map(method => (
                  <div key={method.id} className="border border-border bg-card p-6 rounded-lg">
                    <h4 className="font-medium text-sm uppercase tracking-wider">{method.label}</h4>
                    <p className="mt-2 text-xs text-muted-foreground">{method.instructions}</p>
                    <div className="mt-4 space-y-2">
                      {method.fields.map(f => (
                        <div key={f.key} className="text-xs">
                          <span className="font-semibold text-muted-foreground">{f.label}:</span> {f.value}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="border-t border-border py-8 text-center text-xs text-muted-foreground">
            <p className="font-serif tracking-widest uppercase">ATHENEA STORE</p>
            <p className="mt-2">Elegancia en cada detalle — Conectado a Base de Datos Local</p>
          </footer>

          {/* Drawer de Carrito */}
          {cartOpen && (
            <div className="fixed inset-0 z-50 flex justify-end bg-black/40 backdrop-blur-sm">
              <div className="w-full max-w-md bg-background p-6 shadow-xl flex flex-col h-full">
                <div className="flex items-center justify-between border-b border-border pb-4">
                  <h3 className="font-serif text-lg">Tu Carrito</h3>
                  <button onClick={() => setCartOpen(false)} className="text-sm uppercase tracking-widest">Cerrar</button>
                </div>
                
                <div className="flex-1 overflow-y-auto py-4 space-y-4">
                  {cart.length === 0 ? (
                    <p className="text-center text-sm text-muted-foreground py-12">Tu carrito está vacío.</p>
                  ) : (
                    cart.map(item => {
                      const prod = products.find(p => p.id === item.productId);
                      if (!prod) return null;
                      return (
                        <div key={`${item.productId}-${item.size}`} className="flex gap-4 border-b border-border pb-4">
                          <img src={prod.image} className="h-16 w-12 object-cover rounded" />
                          <div className="flex-1">
                            <h4 className="text-sm font-medium">{prod.name}</h4>
                            <p className="text-xs text-muted-foreground">Talla: {item.size}</p>
                            <div className="flex items-center gap-2 mt-2">
                              <button onClick={() => updateCartQuantity(item.productId, item.size, item.quantity - 1)} className="px-2 py-0.5 border border-border rounded text-xs">-</button>
                              <span className="text-xs">{item.quantity}</span>
                              <button onClick={() => updateCartQuantity(item.productId, item.size, item.quantity + 1)} className="px-2 py-0.5 border border-border rounded text-xs">+</button>
                            </div>
                          </div>
                          <div className="text-right">
                            <p className="text-sm font-medium">${prod.price * item.quantity}</p>
                            <button onClick={() => removeFromCart(item.productId, item.size)} className="text-[10px] text-destructive uppercase tracking-wider mt-2">Eliminar</button>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>

                {cart.length > 0 && (
                  <div className="border-t border-border pt-4 space-y-4">
                    <div className="flex justify-between text-sm font-medium">
                      <span>Total:</span>
                      <span>${cartTotal}</span>
                    </div>
                    <button 
                      onClick={() => { setCartOpen(false); setCheckoutOpen(true); }}
                      className="w-full bg-foreground text-background py-3 text-xs uppercase tracking-widest font-medium hover:bg-foreground/90 transition-colors"
                    >
                      Proceder al Pago
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Diálogo de Checkout */}
          {checkoutOpen && (
            <CheckoutDialog 
              cart={cart} 
              products={products} 
              cartTotal={cartTotal} 
              paymentMethods={paymentMethods} 
              whatsapp={whatsapp}
              onClose={() => setCheckoutOpen(false)}
              clearCart={clearCart}
            />
          )}

          {/* Panel de Administración */}
          {adminOpen && (
            <AdminPanel 
              isAdmin={isAdmin} 
              setIsAdmin={setIsAdmin} 
              products={products} 
              categories={categories} 
              paymentMethods={paymentMethods} 
              whatsapp={whatsapp}
              onClose={() => setAdminOpen(false)}
              refreshData={loadStoreData}
            />
          )}
        </div>
      );
    }

    // Componente Diálogo de Checkout
    function CheckoutDialog({ cart, products, cartTotal, paymentMethods, whatsapp, onClose, clearCart }) {
      const [selectedMethod, setSelectedMethod] = useState('');
      const [isSending, setIsSending] = useState(false);

      const handleOrder = async () => {
        if (isSending) return;
        setIsSending(true);

        const orderItems = cart.map(item => {
          const prod = products.find(p => p.id === item.productId);
          return {
            productId: item.productId,
            name: prod ? prod.name : 'Producto',
            size: item.size,
            quantity: item.quantity,
            price: prod ? prod.price : 0
          };
        });

        try {
          await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sessionId,
              items: orderItems,
              total: cartTotal,
              paymentMethod: selectedMethod
            })
          });

          const method = paymentMethods.find(m => m.id === selectedMethod);

          // Construir mensaje de WhatsApp limpio, justificado a la izquierda y sin símbolos raros
          let message = `NUEVO PEDIDO - ATHENEA STORE\n\n`;
          message += `DETALLE DE LA COMPRA:\n`;
          orderItems.forEach(item => {
            message += `- ${item.name} (Talla: ${item.size}) x${item.quantity} - $${item.price * item.quantity}\n`;
          });
          message += `\nMONTO TOTAL: $${cartTotal}\n\n`;
          message += `Hola, acabo de realizar este pedido desde la web. Por favor, confírmame para procesar mi pedido.`;

          const waUrl = `https://wa.me/${whatsapp}?text=${encodeURIComponent(message)}`;
          window.open(waUrl, '_blank');
          clearCart();
          onClose();
        } catch (err) {
          console.error("Error creando pedido:", err);
          alert("Ocurrió un error al procesar el pedido.");
        } finally {
          setIsSending(false);
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 overflow-y-auto">
          <div className="w-full max-w-md bg-background p-6 rounded-lg shadow-xl border border-border my-8 max-h-[90vh] overflow-y-auto">
            <div className="flex justify-between items-center border-b border-border pb-4 mb-4 sticky top-0 bg-background z-10">
              <h3 className="font-serif text-lg">Completar Pedido</h3>
              <button onClick={onClose} className="text-xs uppercase tracking-widest">Cerrar</button>
            </div>

            <div className="space-y-4">
              <p className="text-xs text-muted-foreground">Selecciona tu método de pago preferido para ver los datos:</p>
              <div className="space-y-2">
                {paymentMethods.filter(m => m.enabled).map(m => (
                  <label key={m.id} className="flex items-center gap-3 p-3 border border-border rounded-lg cursor-pointer hover:bg-accent/50">
                    <input 
                      type="radio" 
                      name="payment" 
                      value={m.id} 
                      checked={selectedMethod === m.id}
                      onChange={() => setSelectedMethod(m.id)}
                      className="accent-foreground"
                    />
                    <span className="text-sm font-medium">{m.label}</span>
                  </label>
                ))}
              </div>

              {/* Mostrar los datos del método de pago seleccionado directamente en pantalla */}
              {selectedMethod && (
                <div className="mt-4 p-4 bg-muted/50 border border-border rounded-lg space-y-3 animate-in fade-in duration-200">
                  <h4 className="text-xs font-bold uppercase tracking-wider text-foreground">
                    Datos para realizar el pago:
                  </h4>
                  <p className="text-xs text-muted-foreground leading-relaxed">
                    {paymentMethods.find(m => m.id === selectedMethod)?.instructions}
                  </p>
                  <div className="space-y-1.5 border-t border-border pt-2">
                    {paymentMethods.find(m => m.id === selectedMethod)?.fields.map(f => (
                      <div key={f.key} className="text-xs flex items-center justify-between gap-2 py-1">
                        <span className="font-semibold text-muted-foreground shrink-0">{f.label}:</span>
                        <div className="flex items-center gap-1.5 overflow-hidden">
                          <span className="font-medium text-foreground truncate">{f.value}</span>
                          <button 
                            type="button"
                            onClick={() => {
                              navigator.clipboard.writeText(f.value);
                              alert(`¡Copiado: ${f.value}!`);
                            }}
                            className="text-[10px] bg-foreground text-background px-1.5 py-0.5 rounded hover:opacity-80 shrink-0"
                          >
                            Copiar
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <button 
                disabled={!selectedMethod || isSending}
                onClick={handleOrder}
                className="w-full bg-foreground text-background py-2.5 text-xs uppercase tracking-widest font-medium disabled:opacity-50"
              >
                {isSending ? 'Procesando...' : 'Enviar Pedido por WhatsApp'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Componente Panel de Administración
    function AdminPanel({ isAdmin, setIsAdmin, products, categories, paymentMethods, whatsapp, onClose, refreshData }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [activeTab, setActiveTab] = useState('products');

      // Formulario de Producto
      const [editingProductId, setEditingProductId] = useState(null); // ID del producto que se está editando
      const [prodName, setProdName] = useState('');
      const [prodPrice, setProdPrice] = useState('');
      const [prodCategory, setProdCategory] = useState('');
      const [prodDesc, setProdDesc] = useState('');
      const [prodSizes, setProdSizes] = useState('S,M,L');
      const [selectedFile, setSelectedFile] = useState(null);
      const [isSaving, setIsSaving] = useState(false);
      const [showEditModal, setShowEditModal] = useState(false); // Controla si se muestra la ventana flotante de edición

      // Formulario de Categoría
      const [catName, setCatName] = useState('');
      const [catDept, setCatDept] = useState('mujer');

      // WhatsApp
      const [waNum, setWaNum] = useState(whatsapp);

      // Efecto para inicializar la categoría por defecto cuando carguen las categorías
      useEffect(() => {
        if (categories.length > 0 && !prodCategory) {
          setProdCategory(categories[0].id);
        }
      }, [categories]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (username === 'athenea' && password === 'athenea123') {
          setIsAdmin(true);
          localStorage.setItem('athenea-admin-session', 'true');
        } else {
          alert('Credenciales incorrectas');
        }
      };

      const handleLogout = () => {
        setIsAdmin(false);
        localStorage.removeItem('athenea-admin-session');
      };

      const handleAddProduct = async (e) => {
        e.preventDefault();
        if (isSaving) return;
        setIsSaving(true);

        try {
          let imageUrl = '';

          // Si estamos editando, conservar la imagen anterior por defecto
          if (editingProductId) {
            const currentProd = products.find(p => p.id === editingProductId);
            if (currentProd) imageUrl = currentProd.image;
          } else {
            imageUrl = 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=600';
          }

          // Si el usuario seleccionó un archivo nuevo, subirlo
          if (selectedFile) {
            const formData = new FormData();
            formData.append('image', selectedFile);
            const uploadRes = await fetch('/api/upload', {
              method: 'POST',
              body: formData
            });
            
            if (!uploadRes.ok) {
              throw new Error('Error al subir la imagen al servidor.');
            }
            
            const uploadData = await uploadRes.json();
            if (uploadData.imageUrl) {
              imageUrl = uploadData.imageUrl;
            }
          }

          const url = editingProductId ? `/api/products/${editingProductId}` : '/api/products';
          const method = editingProductId ? 'PATCH' : 'POST';

          const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: prodName,
              price: parseFloat(prodPrice),
              categoryId: prodCategory || (categories.length > 0 ? categories[0].id : ''),
              image: imageUrl,
              description: prodDesc,
              sizes: prodSizes.split(',').map(s => s.trim()).filter(Boolean)
            })
          });

          if (!res.ok) {
            const errData = await res.json();
            alert('Error al guardar: ' + (errData.error || 'Error desconocido'));
            setIsSaving(false);
            return;
          }

          setProdName('');
          setProdPrice('');
          setProdDesc('');
          setSelectedFile(null);
          setEditingProductId(null);
          setShowEditModal(false); // Cerrar la ventana flotante de edición
          await refreshData(); // Recargar los datos de la tienda
          alert(editingProductId ? '¡Producto actualizado con éxito!' : '¡Producto agregado con éxito!');
        } catch (err) {
          console.error(err);
          alert('Error de conexión al guardar el producto: ' + err.message);
        } finally {
          setIsSaving(false);
        }
      };

      const handleStartEdit = (product) => {
        setEditingProductId(product.id);
        setProdName(product.name);
        setProdPrice(product.price);
        setProdCategory(product.categoryId);
        setProdDesc(product.description || '');
        setProdSizes(product.sizes.join(','));
        setSelectedFile(null);
        setShowEditModal(true); // Abrir la ventana flotante de edición en tu cara
      };

      const handleCancelEdit = () => {
        setEditingProductId(null);
        setProdName('');
        setProdPrice('');
        setProdDesc('');
        setProdSizes('S,M,L');
        setSelectedFile(null);
        setShowEditModal(false); // Cerrar la ventana flotante de edición
      };

      const handleDeleteProduct = async (id) => {
        if (!confirm('¿Seguro que deseas eliminar este producto?')) return;
        try {
          await fetch(`/api/products/${id}`, { method: 'DELETE' });
          refreshData();
        } catch (err) {
          console.error(err);
        }
      };

      const handleAddCategory = async (e) => {
        e.preventDefault();
        try {
          await fetch('/api/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: catName, department: catDept })
          });
          setCatName('');
          refreshData();
          alert('Categoría agregada con éxito');
        } catch (err) {
          console.error(err);
        }
      };

      const handleDeleteCategory = async (id) => {
        if (!confirm('¿Seguro que deseas eliminar esta categoría?')) return;
        try {
          await fetch(`/api/categories/${id}`, { method: 'DELETE' });
          refreshData();
        } catch (err) {
          console.error(err);
        }
      };

      const handleUpdateWhatsapp = async (e) => {
        e.preventDefault();
        try {
          await fetch('/api/settings/whatsapp', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: waNum })
          });
          refreshData();
          alert('WhatsApp actualizado');
        } catch (err) {
          console.error(err);
        }
      };

      const handleTogglePayment = async (id, enabled) => {
        try {
          await fetch(`/api/payment-methods/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled })
          });
          refreshData();
        } catch (err) {
          console.error(err);
        }
      };

      const handleUpdatePaymentField = async (methodId, fieldKey, value) => {
        try {
          await fetch(`/api/payment-methods/${methodId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fieldKey, value })
          });
          refreshData();
        } catch (err) {
          console.error(err);
        }
      };

      if (!isAdmin) {
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
            <div className="w-full max-w-sm bg-background p-6 rounded-lg shadow-xl border border-border">
              <div className="flex justify-between items-center border-b border-border pb-4 mb-4">
                <h3 className="font-serif text-lg">Acceso Admin</h3>
                <button onClick={onClose} className="text-xs uppercase tracking-widest">Cerrar</button>
              </div>
              <form onSubmit={handleLogin} className="space-y-4">
                <input 
                  type="text" 
                  placeholder="Usuario" 
                  value={username} 
                  onChange={e => setUsername(e.target.value)}
                  className="w-full p-2.5 border border-border rounded bg-background text-sm"
                />
                <input 
                  type="password" 
                  placeholder="Contraseña" 
                  value={password} 
                  onChange={e => setPassword(e.target.value)}
                  className="w-full p-2.5 border border-border rounded bg-background text-sm"
                />
                <button type="submit" className="w-full bg-foreground text-background py-2.5 text-xs uppercase tracking-widest font-medium">
                  Ingresar
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 z-50 flex bg-black/40 backdrop-blur-sm justify-end">
          <div className="w-full max-w-2xl bg-background p-6 shadow-xl flex flex-col h-full overflow-y-auto">
            <div className="flex items-center justify-between border-b border-border pb-4 mb-6">
              <h3 className="font-serif text-xl">Panel de Control</h3>
              <div className="flex gap-4 items-center">
                <button onClick={handleLogout} className="text-xs text-destructive uppercase tracking-widest">Salir</button>
                <button onClick={onClose} className="text-xs uppercase tracking-widest">Cerrar</button>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex gap-4 border-b border-border pb-4 mb-6">
              {['products', 'categories', 'payments', 'settings'].map(tab => (
                <button 
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`text-xs uppercase tracking-widest pb-2 border-b-2 transition-all ${activeTab === tab ? 'border-foreground font-semibold' : 'border-transparent text-muted-foreground'}`}
                >
                  {tab === 'products' ? 'Productos' : tab === 'categories' ? 'Categorías' : tab === 'payments' ? 'Pagos' : 'Ajustes'}
                </button>
              ))}
            </div>

            {/* Contenido de Tabs */}
            {activeTab === 'products' && (
              <div className="space-y-6">
                {/* Formulario de Creación (Solo se muestra si NO estamos editando) */}
                {!editingProductId && (
                  <form onSubmit={handleAddProduct} className="space-y-4 border border-border p-4 rounded-lg">
                    <div className="flex justify-between items-center">
                      <h4 className="text-sm font-semibold uppercase tracking-wider">
                        Agregar Nuevo Producto
                      </h4>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <input type="text" placeholder="Nombre" value={prodName} onChange={e => setProdName(e.target.value)} required className="p-2 border border-border rounded bg-background text-sm" />
                      <input type="number" placeholder="Precio ($)" value={prodPrice} onChange={e => setProdPrice(e.target.value)} required className="p-2 border border-border rounded bg-background text-sm" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <select value={prodCategory} onChange={e => setProdCategory(e.target.value)} required className="p-2 border border-border rounded bg-background text-sm">
                        <option value="">Seleccionar Categoría</option>
                        {categories.map(c => <option key={c.id} value={c.id}>{c.name} ({c.department})</option>)}
                      </select>
                      <input type="text" placeholder="Tallas (separadas por coma)" value={prodSizes} onChange={e => setProdSizes(e.target.value)} className="p-2 border border-border rounded bg-background text-sm" />
                    </div>
                    <div className="space-y-1">
                      <label className="text-xs text-muted-foreground uppercase tracking-wider block">Foto del Producto (Sube desde tu Celular o PC):</label>
                      <input 
                        type="file" 
                        accept="image/*" 
                        onChange={e => setSelectedFile(e.target.files[0])} 
                        required
                        className="w-full p-2 border border-border rounded bg-background text-sm" 
                      />
                      {selectedFile && (
                        <div className="mt-2">
                          <p className="text-[10px] uppercase tracking-wider text-muted-foreground mb-1">Vista Previa:</p>
                          <img 
                            src={URL.createObjectURL(selectedFile)} 
                            alt="Vista previa" 
                            className="h-32 w-24 object-cover rounded border border-border"
                          />
                        </div>
                      )}
                    </div>
                    <textarea placeholder="Descripción" value={prodDesc} onChange={e => setProdDesc(e.target.value)} className="w-full p-2 border border-border rounded bg-background text-sm h-16" />
                    <button 
                      type="submit" 
                      disabled={isSaving}
                      className="w-full bg-foreground text-background py-2 text-xs uppercase tracking-widest font-medium disabled:opacity-50"
                    >
                      {isSaving ? 'Guardando...' : 'Guardar Producto'}
                    </button>
                  </form>
                )}

                {/* VENTANA FLOTANTE DE EDICIÓN (MODAL EN TU CARA) */}
                {showEditModal && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                    <div className="w-full max-w-lg bg-background p-6 rounded-lg shadow-2xl border border-border space-y-4 animate-in fade-in zoom-in-95 duration-200">
                      <div className="flex justify-between items-center border-b border-border pb-3">
                        <h4 className="text-base font-serif font-semibold uppercase tracking-wider flex items-center gap-2">
                          ✏️ Editar Producto
                        </h4>
                        <button 
                          type="button" 
                          onClick={handleCancelEdit} 
                          className="text-xs bg-destructive text-destructive-foreground px-3 py-1 rounded uppercase tracking-widest hover:opacity-90"
                        >
                          Cerrar
                        </button>
                      </div>

                      <form onSubmit={handleAddProduct} className="space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                          <div className="space-y-1">
                            <label className="text-[10px] uppercase tracking-wider text-muted-foreground">Nombre:</label>
                            <input type="text" placeholder="Nombre" value={prodName} onChange={e => setProdName(e.target.value)} required className="w-full p-2 border border-border rounded bg-background text-sm" />
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] uppercase tracking-wider text-muted-foreground">Precio ($):</label>
                            <input type="number" placeholder="Precio ($)" value={prodPrice} onChange={e => setProdPrice(e.target.value)} required className="w-full p-2 border border-border rounded bg-background text-sm" />
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div className="space-y-1">
                            <label className="text-[10px] uppercase tracking-wider text-muted-foreground">Categoría:</label>
                            <select value={prodCategory} onChange={e => setProdCategory(e.target.value)} required className="w-full p-2 border border-border rounded bg-background text-sm">
                              <option value="">Seleccionar Categoría</option>
                              {categories.map(c => <option key={c.id} value={c.id}>{c.name} ({c.department})</option>)}
                            </select>
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] uppercase tracking-wider text-muted-foreground">Tallas:</label>
                            <input type="text" placeholder="Tallas (separadas por coma)" value={prodSizes} onChange={e => setProdSizes(e.target.value)} className="w-full p-2 border border-border rounded bg-background text-sm" />
                          </div>
                        </div>

                        <div className="space-y-1">
                          <label className="text-[10px] uppercase tracking-wider text-muted-foreground">Cambiar Foto (Opcional):</label>
                          <input 
                            type="file" 
                            accept="image/*" 
                            onChange={e => setSelectedFile(e.target.files[0])} 
                            className="w-full p-2 border border-border rounded bg-background text-sm" 
                          />
                          {selectedFile && (
                            <div className="mt-2">
                              <p className="text-[10px] uppercase tracking-wider text-muted-foreground mb-1">Nueva Foto Seleccionada:</p>
                              <img 
                                src={URL.createObjectURL(selectedFile)} 
                                alt="Vista previa" 
                                className="h-32 w-24 object-cover rounded border border-border"
                              />
                            </div>
                          )}
                          {!selectedFile && editingProductId && (
                            <div className="mt-2">
                              <p className="text-[10px] uppercase tracking-wider text-muted-foreground mb-1">Foto Actual:</p>
                              <img 
                                src={products.find(p => p.id === editingProductId)?.image} 
                                alt="Foto actual" 
                                className="h-32 w-24 object-cover rounded border border-border"
                              />
                            </div>
                          )}
                        </div>

                        <div className="space-y-1">
                          <label className="text-[10px] uppercase tracking-wider text-muted-foreground">Descripción:</label>
                          <textarea placeholder="Descripción" value={prodDesc} onChange={e => setProdDesc(e.target.value)} className="w-full p-2 border border-border rounded bg-background text-sm h-16" />
                        </div>

                        <div className="flex gap-2 pt-2">
                          <button 
                            type="button" 
                            onClick={handleCancelEdit} 
                            className="w-1/2 border border-border py-2.5 text-xs uppercase tracking-widest"
                          >
                            Cancelar
                          </button>
                          <button 
                            type="submit" 
                            disabled={isSaving}
                            className="w-1/2 bg-foreground text-background py-2.5 text-xs uppercase tracking-widest font-medium disabled:opacity-50"
                          >
                            {isSaving ? 'Guardando...' : 'Actualizar Producto'}
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                <div className="space-y-2">
                  <h4 className="text-sm font-semibold uppercase tracking-wider">Productos Existentes</h4>
                  <div className="divide-y divide-border">
                    {products.map(p => (
                      <div key={p.id} className="flex items-center justify-between py-3">
                        <div className="flex items-center gap-3">
                          <img src={p.image} className="h-10 w-8 object-cover rounded" />
                          <div>
                            <p className="text-sm font-medium">{p.name}</p>
                            <p className="text-xs text-muted-foreground">${p.price}</p>
                          </div>
                        </div>
                        <div className="flex gap-3 items-center">
                          <button 
                            onClick={() => handleStartEdit(p)} 
                            className="text-xs text-foreground uppercase tracking-widest hover:underline"
                          >
                            Editar
                          </button>
                          <button 
                            onClick={() => handleDeleteProduct(p.id)} 
                            className="text-xs text-destructive uppercase tracking-widest hover:underline"
                          >
                            Eliminar
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'categories' && (
              <div className="space-y-6">
                <form onSubmit={handleAddCategory} className="space-y-4 border border-border p-4 rounded-lg">
                  <h4 className="text-sm font-semibold uppercase tracking-wider">Agregar Nueva Categoría</h4>
                  <div className="grid grid-cols-2 gap-4">
                    <input type="text" placeholder="Nombre de Categoría" value={catName} onChange={e => setCatName(e.target.value)} required className="p-2 border border-border rounded bg-background text-sm" />
                    <select value={catDept} onChange={e => setCatDept(e.target.value)} className="p-2 border border-border rounded bg-background text-sm">
                      <option value="mujer">Mujer</option>
                      <option value="hombre">Hombre</option>
                      <option value="ninos">Niños</option>
                    </select>
                  </div>
                  <button type="submit" className="w-full bg-foreground text-background py-2 text-xs uppercase tracking-widest font-medium">Guardar Categoría</button>
                </form>

                <div className="space-y-2">
                  <h4 className="text-sm font-semibold uppercase tracking-wider">Categorías Existentes</h4>
                  <div className="divide-y divide-border">
                    {categories.map(c => (
                      <div key={c.id} className="flex items-center justify-between py-3">
                        <div>
                          <p className="text-sm font-medium">{c.name}</p>
                          <p className="text-xs text-muted-foreground uppercase tracking-wider">{c.department}</p>
                        </div>
                        <button onClick={() => handleDeleteCategory(c.id)} className="text-xs text-destructive uppercase tracking-widest">Eliminar</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'payments' && (
              <div className="space-y-6">
                {paymentMethods.map(method => (
                  <div key={method.id} className="border border-border p-4 rounded-lg space-y-4">
                    <div className="flex items-center justify-between">
                      <h4 className="text-sm font-semibold uppercase tracking-wider">{method.label}</h4>
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input 
                          type="checkbox" 
                          checked={method.enabled} 
                          onChange={e => handleTogglePayment(method.id, e.target.checked)}
                          className="accent-foreground"
                        />
                        <span className="text-xs uppercase tracking-widest">Habilitado</span>
                      </label>
                    </div>
                    <div className="space-y-2">
                      {method.fields.map(field => (
                        <div key={field.key} className="flex items-center gap-2">
                          <span className="text-xs font-medium w-24 text-muted-foreground">{field.label}:</span>
                          <input 
                            type="text" 
                            value={field.value} 
                            onChange={e => handleUpdatePaymentField(method.id, field.key, e.target.value)}
                            className="flex-1 p-1.5 border border-border rounded bg-background text-xs"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'settings' && (
              <div className="space-y-6">
                <form onSubmit={handleUpdateWhatsapp} className="space-y-4 border border-border p-4 rounded-lg">
                  <h4 className="text-sm font-semibold uppercase tracking-wider">Configuración de WhatsApp</h4>
                  <p className="text-xs text-muted-foreground">Número al que llegarán los pedidos (con código de país, ej: 584120000000):</p>
                  <input 
                    type="text" 
                    value={waNum} 
                    onChange={e => setWaNum(e.target.value)} 
                    required 
                    className="w-full p-2 border border-border rounded bg-background text-sm" 
                  />
                  <button type="submit" className="w-full bg-foreground text-background py-2 text-xs uppercase tracking-widest font-medium">Actualizar WhatsApp</button>
                </form>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
